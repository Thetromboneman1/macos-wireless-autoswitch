name: Sync Fork From Upstream

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Don't fail loudly on transient GitHub-hosted runner acquisition timeouts;
    # the next scheduled run (every 30 min) will pick up where this left off.
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure origin auth for push
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Add upstream remote
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/locus313/macos-wireless-autoswitch.git || \
            git remote set-url upstream https://github.com/locus313/macos-wireless-autoswitch.git

          # Fetch upstream anonymously to avoid occasional credential-header prompt failures.
          for attempt in 1 2 3; do
            if git -c http.https://github.com/.extraheader= fetch --prune --no-tags upstream main; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to fetch upstream/main after 3 attempts"
              exit 1
            fi

            sleep $((attempt * 5))
          done

      - name: Fast-forward fork main from upstream
        run: |
          set -euo pipefail

          if git merge-base --is-ancestor HEAD upstream/main; then
            if [ "$(git rev-parse HEAD)" = "$(git rev-parse upstream/main)" ]; then
              echo "Fork already up to date with upstream/main"
              exit 0
            fi
            git merge --ff-only upstream/main
            git push origin HEAD:main
            echo "Fork updated from upstream/main"
          else
            echo "Fork has commits not in upstream; skipping auto-ff to avoid rewriting history"
          fi
