name: Create Release

on:
  pull_request:
    branches: [main]
    paths:
      - wireless.sh
      - install.sh
      - com.computernetworkbasics.wifionoff.plist
    types: [closed]

permissions:
  contents: read

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v1.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          major="${major:-1}"
          minor="${minor:-0}"
          patch="${patch:-0}"
          new_version="v${major}.${minor}.$((patch + 1))"

          {
            echo "latest_tag=$latest_tag"
            echo "new_version=$new_version"
            echo "archive_name=macos-wireless-autoswitch-$new_version"
          } >> "$GITHUB_OUTPUT"

      - name: Check release inputs changed
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="${{ steps.version.outputs.latest_tag }}"
          files=(wireless.sh install.sh com.computernetworkbasics.wifionoff.plist)
          if git rev-parse "$latest_tag" >/dev/null 2>&1; then
            changed="$(git diff --name-only "$latest_tag"..HEAD -- "${files[@]}")"
          else
            changed="${files[*]}"
          fi

          if [[ -n "$changed" ]]; then
            echo "changes_detected=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$changed"
          else
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.changes.outputs.changes_detected == 'true'
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="${{ steps.version.outputs.latest_tag }}"
          new_version="${{ steps.version.outputs.new_version }}"
          {
            echo "## Changes in $new_version"
            echo
            if git rev-parse "$latest_tag" >/dev/null 2>&1; then
              echo "### Updated Files"
              git diff --name-only "$latest_tag"..HEAD -- \
                wireless.sh \
                install.sh \
                com.computernetworkbasics.wifionoff.plist |
                sed 's/^/- `/' | sed 's/$/`/'
              echo
              echo "### Commit History"
              git log "$latest_tag"..HEAD --oneline --format="- %s (%h)"
            else
              echo "### Initial Release"
              echo "Initial release of macOS Wireless Auto-Switch."
            fi
            echo
            echo "### Installation"
            echo "Run \`./install.sh i\` from the extracted release archive."
          } > release_notes.md

      - name: Create release archives
        if: steps.changes.outputs.changes_detected == 'true'
        shell: bash
        run: |
          set -euo pipefail

          archive_name="${{ steps.version.outputs.archive_name }}"
          mkdir -p "$archive_name"
          cp wireless.sh install.sh com.computernetworkbasics.wifionoff.plist "$archive_name/"
          cp README.md LICENSE "$archive_name/"
          cat > "$archive_name/INSTALL.txt" <<'EOF'
          macOS Wireless Auto-Switch Installation

          1. chmod +x install.sh
          2. ./install.sh i

          Uninstall with:
          ./install.sh ui
          EOF

          tar -czf "$archive_name.tar.gz" "$archive_name"
          zip -r "$archive_name.zip" "$archive_name"

      - name: Publish release
        if: steps.changes.outputs.changes_detected == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: ${{ steps.version.outputs.new_version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            ${{ steps.version.outputs.archive_name }}.tar.gz
            ${{ steps.version.outputs.archive_name }}.zip

      - name: No changes detected
        if: steps.changes.outputs.changes_detected == 'false'
        run: echo "No release input changes detected; skipping release."
