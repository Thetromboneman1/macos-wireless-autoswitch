name: Validate Core Files

on:
  push:
    paths:
      - wireless.sh
      - install.sh
      - com.computernetworkbasics.wifionoff.plist
  pull_request:
    paths:
      - wireless.sh
      - install.sh
      - com.computernetworkbasics.wifionoff.plist

permissions:
  contents: read

concurrency:
  group: validate-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install validation tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck libxml2-utils

      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail

          test -f wireless.sh
          test -f install.sh
          grep -q '^#!/bin/bash' wireless.sh
          grep -q '^#!/bin/bash' install.sh
          shellcheck wireless.sh install.sh
          grep -q 'networksetup' wireless.sh
          grep -q 'setairportpower' wireless.sh
          grep -q '/Library/Scripts/NetBasics' install.sh
          grep -q '/Library/LaunchDaemons' install.sh

      - name: Validate plist file
        shell: bash
        run: |
          set -euo pipefail

          plist="com.computernetworkbasics.wifionoff.plist"
          test -f "$plist"
          xmllint --noout "$plist"
          grep -q '<key>Label</key>' "$plist"
          grep -q '<key>ProgramArguments</key>' "$plist"
          grep -q '<key>WatchPaths</key>' "$plist"
          grep -q '/Library/Scripts/NetBasics/wireless.sh' "$plist"
          grep -q '/Library/Preferences/SystemConfiguration' "$plist"

      - name: Validate macOS compatibility markers
        shell: bash
        run: |
          set -euo pipefail

          grep -q 'uname -a' wireless.sh
          grep -q '23|24|25' wireless.sh
          grep -q 'networksetup.*listnetworkserviceorder' wireless.sh
